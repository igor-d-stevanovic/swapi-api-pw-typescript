name: SWAPI API Tests

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (API tests only – no browsers needed)
        run: npx playwright install --with-deps chromium

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Restore Allure history
        uses: actions/cache@v4
        with:
          path: allure-results/history
          key: allure-history-${{ github.run_id }}
          restore-keys: |
            allure-history-

      - name: Run tests with Allure results
        run: npm test -- --reporter=list --reporter=allure-playwright
        continue-on-error: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Install Allure CLI
        if: always()
        run: |
          npm install -g allure-commandline@2.32.0
          allure --version

      - name: Generate Allure report
        if: always()
        run: |
          allure generate allure-results -o allure-report --clean
          echo "Allure report generated in allure-report/"

      - name: Update Allure history for next run
        if: always()
        run: |
          rm -rf allure-results/history
          cp -r allure-report/history allure-results/history || true

      - name: Setup Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Allure report to Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Add Allure report link to summary
        if: always()
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BUILD_NUM="${{ github.run_number }}"
          PAGES_BASE="https://${REPO_OWNER}.github.io/${REPO_NAME}"
          echo "## 📊 Allure Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **Build:** #${BUILD_NUM}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "🔗 **[View Report](${PAGES_BASE})**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Report is only deployed to GitHub Pages on pushes to \`main\`." >> $GITHUB_STEP_SUMMARY
            echo "Allure results are available as a build artifact." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 [Download Allure Results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
