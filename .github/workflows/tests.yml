name: SWAPI API Tests

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (API tests only – no browsers needed)
        run: npx playwright install --with-deps chromium

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run tests with Allure results
        run: npm test -- --reporter=list --reporter=allure-playwright
        continue-on-error: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Install Allure CLI
        if: always()
        run: |
          npm install -g allure-commandline@2.32.0
          allure --version

      - name: Get Allure history from gh-pages
        if: always()
        run: |
          GH_PAGES_DIR=$(mktemp -d)
          git fetch origin gh-pages || true
          if git rev-parse --verify origin/gh-pages > /dev/null 2>&1; then
            echo "gh-pages branch found, cloning into temp dir..."
            git worktree add "$GH_PAGES_DIR" origin/gh-pages || true
            LAST_HISTORY=$(ls -d "$GH_PAGES_DIR"/*/history 2>/dev/null | sort -t/ -k2 -n | tail -1)
            if [ -n "$LAST_HISTORY" ]; then
              echo "Copying history from: $LAST_HISTORY"
              cp -r "$LAST_HISTORY" allure-results/history
            else
              echo "No history folder found in gh-pages."
            fi
            echo "GH_PAGES_DIR=$GH_PAGES_DIR" >> $GITHUB_ENV
            echo "HAS_GH_PAGES=true" >> $GITHUB_ENV
          else
            echo "No gh-pages branch yet, starting fresh."
            echo "HAS_GH_PAGES=false" >> $GITHUB_ENV
          fi

      - name: Generate Allure report
        if: always()
        run: |
          allure generate allure-results -o allure-report --clean
          echo "Allure report generated in allure-report/"

      - name: Prepare allure-history for deployment
        if: always()
        run: |
          BUILD_NUM=${{ github.run_number }}
          mkdir -p allure-history/$BUILD_NUM
          cp -r allure-report/* allure-history/$BUILD_NUM/
          echo "<meta http-equiv='refresh' content='0; url=$BUILD_NUM/index.html'>" > allure-history/index.html
          if [ "$HAS_GH_PAGES" = "true" ] && [ -d "$GH_PAGES_DIR" ]; then
            for dir in "$GH_PAGES_DIR"/*/; do
              [ ! -d "$dir" ] && continue
              dir_name=$(basename "$dir")
              if [ "$dir_name" != "$BUILD_NUM" ]; then
                cp -rn "$dir" "allure-history/$dir_name" 2>/dev/null || true
              fi
            done
            git worktree remove "$GH_PAGES_DIR" --force 2>/dev/null || true
            cd allure-history
            ls -d [0-9]*/ 2>/dev/null | sort -n | head -n -20 | xargs rm -rf 2>/dev/null || true
            cd ..
          fi

      - name: Enable GitHub Pages on gh-pages branch
        if: always() && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "204" ]; then
            echo "✅ GitHub Pages enabled successfully."
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "✅ GitHub Pages already configured."
          else
            echo "⚠️ Could not enable GitHub Pages via API (HTTP $HTTP_CODE)."
          fi

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: false
          force_orphan: true

      - name: Add Allure report link to summary
        if: always()
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BUILD_NUM="${{ github.run_number }}"
          PAGES_BASE="https://${REPO_OWNER}.github.io/${REPO_NAME}"
          BUILD_URL="${PAGES_BASE}/${BUILD_NUM}/index.html"
          echo "## 📊 Allure Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **Build:** #${BUILD_NUM}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "🔗 **[View This Build Report](${BUILD_URL})**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🌐 **[View Latest Report (gh-pages)](${PAGES_BASE})**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Report is only deployed to GitHub Pages on pushes to \`main\`." >> $GITHUB_STEP_SUMMARY
            echo "Allure results are available as a build artifact." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 [Download Allure Results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
